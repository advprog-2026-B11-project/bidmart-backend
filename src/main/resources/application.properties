spring.application.name=bidmart-backend

spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.validation.group.pre-persist=jakarta.validation.groups.Default,com.example.bidmart.common.validation.OnCreate
spring.jpa.properties.jakarta.persistence.validation.group.pre-update=jakarta.validation.groups.Default

# Email Configuration (Brevo HTTP API — Render free tier blocks SMTP ports 587/465)
app.email.brevo.api-key=${BREVO_API_KEY:}
app.email.brevo.url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}

app.email.from=${APP_EMAIL_FROM:bidmart.b11@gmail.com}
app.email.from-name=${APP_EMAIL_FROM_NAME:BidMart}
app.email.verification-url-template=${APP_EMAIL_VERIFY_URL:http://localhost:8080/api/auth/verify?token={token}}
app.email.verification-subject=${APP_EMAIL_VERIFY_SUBJECT:Verify your BidMart account}
app.email.mfa-subject=${APP_EMAIL_MFA_SUBJECT:Your BidMart login code}
app.mfa.email-code-ttl-seconds=${APP_MFA_EMAIL_CODE_TTL_SECONDS:300}
app.session.max-concurrent=${APP_SESSION_MAX_CONCURRENT:3}
app.session.overflow-policy=${APP_SESSION_OVERFLOW_POLICY:REVOKE_OLDEST}
app.rate-limit.login.max-requests=${APP_RATE_LIMIT_LOGIN_MAX:5}
app.rate-limit.login.window-seconds=${APP_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
app.rate-limit.register.max-requests=${APP_RATE_LIMIT_REGISTER_MAX:3}
app.rate-limit.register.window-seconds=${APP_RATE_LIMIT_REGISTER_WINDOW_SECONDS:600}
app.rate-limit.verify-mfa.max-requests=${APP_RATE_LIMIT_VERIFY_MFA_MAX:5}
app.rate-limit.verify-mfa.window-seconds=${APP_RATE_LIMIT_VERIFY_MFA_WINDOW_SECONDS:60}

# JWT Configuration
jwt.secret=${JWT_SECRET_KEY:QmlkbWFydERldlNlY3JldEtleS1SZXBsYWNlVGhpc0luUHJvZHVjdGlvbi0xMjM0NTY3ODkw}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Actuator / Monitoring (Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true