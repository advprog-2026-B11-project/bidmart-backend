version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: bidmart-postgres-local
    environment:
      POSTGRES_USER: bidmart_user
      POSTGRES_PASSWORD: bidmart_password
      POSTGRES_DB: bidmart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: bidmart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: bidmart-grafana
    # Grafana dipetakan ke port 3001 di host agar tidak bentrok dengan
    # frontend Next.js yang memakai localhost:3000.
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_local_data:
  prometheus_data:
  grafana_data: